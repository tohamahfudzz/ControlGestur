<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hand Control</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:black;
        font-family:Arial;
    }

    video, canvas{
        position:absolute;
        width:100vw;
        height:100vh;
        object-fit:cover;
    }

    #info{
        position:absolute;
        top:20px;
        left:50%;
        transform:translateX(-50%);
        z-index:10;

        background:rgba(0,0,0,0.7);
        color:white;
        padding:12px 20px;
        border-radius:12px;

        font-size:20px;
    }
</style>
</head>

<body>

<div id="info">Arahkan tangan ke kamera</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cooldown = false;
let lastGesture = "";

// fungsi cek jari naik
function isFingerUp(tip, pip, landmarks){
    return landmarks[tip].y < landmarks[pip].y;
}

// deteksi gesture
function detectGesture(landmarks){

    const indexUp = isFingerUp(8,6,landmarks);
    const middleUp = isFingerUp(12,10,landmarks);
    const ringUp = isFingerUp(16,14,landmarks);
    const pinkyUp = isFingerUp(20,18,landmarks);

    // telunjuk
    if(indexUp && !middleUp && !ringUp && !pinkyUp){
        return "SELECT";
    }

    // semua jari buka
    if(indexUp && middleUp && ringUp && pinkyUp){
        return "PAUSE";
    }

    // kepalan
    if(!indexUp && !middleUp && !ringUp && !pinkyUp){
        return "STOP";
    }

    return "";
}

// aksi
function runGesture(gesture){

    if(cooldown) return;

    cooldown = true;

    setTimeout(()=>{
        cooldown = false;
    },1500);

    if(gesture === "SELECT"){
        info.innerText = "☝️ SELECT";
        alert("SELECT terdeteksi");
    }

    if(gesture === "PAUSE"){
        info.innerText = "✋ PAUSE";
        alert("PAUSE terdeteksi");
    }

    if(gesture === "STOP"){
        info.innerText = "✊ STOP";
        alert("STOP terdeteksi");
    }
}

// setup mediapipe
const hands = new Hands({
    locateFile: (file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.6
});

// hasil tracking
hands.onResults((results)=>{

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(
        results.image,
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(results.multiHandLandmarks){

        for(const landmarks of results.multiHandLandmarks){

            drawConnectors(
                ctx,
                landmarks,
                HAND_CONNECTIONS,
                {lineWidth:4}
            );

            drawLandmarks(
                ctx,
                landmarks,
                {radius:5}
            );

            const gesture = detectGesture(landmarks);

            if(gesture && gesture !== lastGesture){
                lastGesture = gesture;
                runGesture(gesture);
            }

            if(!gesture){
                lastGesture = "";
            }
        }

    }else{
        info.innerText = "Tangan tidak terdeteksi";
    }

});

// kamera belakang
const camera = new Camera(video,{

    onFrame: async ()=>{
        await hands.send({image: video});
    },

    width:1280,
    height:720

});

camera.start();

// paksa kamera belakang
navigator.mediaDevices.getUserMedia({
    video:{
        facingMode:{
            exact:"environment"
        }
    }
});

</script>

</body>
</html>
