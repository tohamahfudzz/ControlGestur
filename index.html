<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Gesture Detector</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 16px;
    }

    .wrap {
      position: relative;
      width: 92vw;
      max-width: 720px;
      margin: 0 auto;
      aspect-ratio: 4 / 3;
      background: #000;
      border: 2px solid #444;
      border-radius: 16px;
      overflow: hidden;
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      object-fit: cover;
    }

    canvas {
      pointer-events: none;
    }

    #status {
      margin-top: 14px;
      font-size: 18px;
      font-weight: 700;
      color: #7CFF7C;
      min-height: 28px;
    }

    .hint {
      margin-top: 8px;
      color: #bbb;
      font-size: 14px;
    }
  </style>

  <!-- MediaPipe Tasks Vision -->
  <script type="module">
    import {
      FilesetResolver,
      HandLandmarker,
      DrawingUtils
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    let handLandmarker = null;
    let drawingUtils = null;

    let lastGesture = "";
    let lastGestureAlertTime = 0;
    let lastMoveAlertTime = 0;
    let prevIndexTip = null;
    let lastVideoTime = -1;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function classifyGesture(landmarks) {
      // 4 jari selain ibu jari:
      const indexUp  = landmarks[8].y  < landmarks[6].y;
      const middleUp = landmarks[12].y < landmarks[10].y;
      const ringUp   = landmarks[16].y < landmarks[14].y;
      const pinkyUp  = landmarks[20].y < landmarks[18].y;

      const countUp = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

      if (countUp === 4) return "OPEN_PALM";
      if (countUp === 0) return "FIST";
      if (indexUp && middleUp && !ringUp && !pinkyUp) return "PEACE";
      if (indexUp && !middleUp && !ringUp && !pinkyUp) return "POINT";
      return "HAND";
    }

    function maybeNotify(message, kind = "gesture") {
      console.log(`[${kind}] ${message}`);
      setStatus(message);

      const now = Date.now();
      const cooldown = kind === "move" ? 400 : 800;
      const lastTime = kind === "move" ? lastMoveAlertTime : lastGestureAlertTime;

      if (now - lastTime >= cooldown) {
        if (kind === "move") lastMoveAlertTime = now;
        else lastGestureAlertTime = now;

        alert(message);
      }
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user"
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();
    }

    async function createHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },
        runningMode: "VIDEO",
        numHands: 1,
        minHandDetectionConfidence: 0.5,
        minHandPresenceConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
    }

    async function init() {
      try {
        setStatus("Menyalakan kamera...");
        await startCamera();

        setStatus("Memuat model tangan...");
        await createHandLandmarker();

        drawingUtils = new DrawingUtils(ctx);
        setStatus("Siap. Tunjukkan tangan ke kamera.");

        requestAnimationFrame(predictLoop);
      } catch (err) {
        console.error(err);
        setStatus("Error: " + err.message);
      }
    }

    function predictLoop() {
      if (!handLandmarker || video.readyState < 2) {
        requestAnimationFrame(predictLoop);
        return;
      }

      const nowMs = performance.now();

      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const results = handLandmarker.detectForVideo(video, nowMs);

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let detectedSomething = false;

        if (results.landmarks && results.landmarks.length > 0) {
          detectedSomething = true;

          for (const landmarks of results.landmarks) {
            // Gambar landmark
            drawingUtils.drawConnectors(
              landmarks,
              HandLandmarker.HAND_CONNECTIONS,
              { color: "#00FF00", lineWidth: 3 }
            );
            drawingUtils.drawLandmarks(
              landmarks,
              { color: "#FF0000", lineWidth: 2 }
            );

            // Gesture sederhana
            const gesture = classifyGesture(landmarks);

            if (gesture !== lastGesture) {
              lastGesture = gesture;
              if (gesture !== "HAND") {
                maybeNotify(`Gesture terdeteksi: ${gesture}`, "gesture");
              } else {
                console.log("Gesture/tangan terdeteksi");
                setStatus("Tangan terdeteksi");
              }
            }

            // Deteksi gerakan ujung telunjuk
            const tip = landmarks[8];
            const x = Math.round(tip.x * canvas.width);
            const y = Math.round(tip.y * canvas.height);

            if (prevIndexTip) {
              const dx = x - prevIndexTip.x;
              const dy = y - prevIndexTip.y;
              const dist = Math.hypot(dx, dy);

              if (dist > 28) {
                maybeNotify(
                  `Jari bergerak (${Math.round(dist)} px)`,
                  "move"
                );
              }
            }

            prevIndexTip = { x, y };
          }
        }

        if (!detectedSomething) {
          lastGesture = "";
          prevIndexTip = null;
          setStatus("Tidak ada tangan terdeteksi");
        }
      }

      requestAnimationFrame(predictLoop);
    }

    init();
  </script>
</head>
<body>
  <h1>Hand Gesture Detector</h1>

  <div class="wrap">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="status">Loading...</div>
  <div class="hint">
    Coba buka telapak, kepal, tanda peace, atau gerakkan jari telunjuk.
  </div>
</body>
</html>
