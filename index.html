<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gesture Control Test</title>

  <style>

    body{
      margin:0;
      padding:20px;
      background:#111;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1{
      margin-bottom:20px;
    }

    .wrap{
      position:relative;
      width:720px;
      max-width:95vw;
      height:540px;
      margin:auto;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;

      border-radius:16px;
      border:2px solid white;

      transform:scaleX(-1);
      background:black;
    }

    canvas{
      position:absolute;

      top:0;
      left:0;

      width:100%;
      height:100%;

      pointer-events:none;

      transform:scaleX(-1);
    }

    #status{
      margin-top:20px;
      font-size:22px;
      font-weight:bold;
      color:lime;
    }

  </style>
</head>
<body>

<h1>Hand Gesture Detector ✋</h1>

<div class="wrap">

  <video
    id="video"
    autoplay
    playsinline
    muted>
  </video>

  <canvas id="canvas"></canvas>

</div>

<div id="status">
  Loading...
</div>


<script type="module">

import {
  FilesetResolver,
  HandLandmarker,
  DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";


// ================= ELEMENT =================
const video =
  document.getElementById("video");

const canvas =
  document.getElementById("canvas");

const ctx =
  canvas.getContext("2d");

const statusText =
  document.getElementById("status");


// ================= VARIABLE =================
let handLandmarker;

let drawingUtils;

let lastGesture = "";

let prevIndex = null;


// ================= STATUS =================
function setStatus(text){

  statusText.innerHTML = text;

}


// ================= START CAMERA =================
async function startCamera(){

  try{

    const stream =
      await navigator.mediaDevices.getUserMedia({

        video:{
          facingMode:"user",
          width:{ ideal:640 },
          height:{ ideal:480 }
        },

        audio:false
      });

    video.srcObject = stream;

    await video.play();

    console.log(
      "kamera aktif:",
      video.videoWidth,
      video.videoHeight
    );

    setStatus("Kamera aktif 📷");

  }catch(err){

    console.log(err);

    alert(err);

    setStatus(
      "ERROR kamera"
    );
  }
}


// ================= LOAD MODEL =================
async function loadModel(){

  const vision =
    await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
    );

  handLandmarker =
    await HandLandmarker.createFromOptions(
      vision,
      {

        baseOptions:{
          modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },

        runningMode:"VIDEO",

        numHands:1

      }
    );

  drawingUtils =
    new DrawingUtils(ctx);

}


// ================= DETEKSI GESTURE =================
function detectGesture(landmarks){

  const indexUp =
    landmarks[8].y <
    landmarks[6].y;

  const middleUp =
    landmarks[12].y <
    landmarks[10].y;

  const ringUp =
    landmarks[16].y <
    landmarks[14].y;

  const pinkyUp =
    landmarks[20].y <
    landmarks[18].y;

  // telunjuk saja
  if(
    indexUp &&
    !middleUp &&
    !ringUp &&
    !pinkyUp
  ){
    return "POINT ☝️";
  }

  // peace
  if(
    indexUp &&
    middleUp &&
    !ringUp &&
    !pinkyUp
  ){
    return "PEACE ✌️";
  }

  // semua jari buka
  if(
    indexUp &&
    middleUp &&
    ringUp &&
    pinkyUp
  ){
    return "OPEN HAND ✋";
  }

  // semua tutup
  if(
    !indexUp &&
    !middleUp &&
    !ringUp &&
    !pinkyUp
  ){
    return "FIST ✊";
  }

  return "HAND";
}


// ================= LOOP =================
async function predictLoop(){

  if(
    !handLandmarker ||
    video.readyState < 2
  ){

    requestAnimationFrame(
      predictLoop
    );

    return;
  }

  canvas.width =
    video.videoWidth;

  canvas.height =
    video.videoHeight;

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  const results =
    handLandmarker.detectForVideo(
      video,
      performance.now()
    );

  // ada tangan
  if(
    results.landmarks &&
    results.landmarks.length > 0
  ){

    const landmarks =
      results.landmarks[0];

    // gambar garis tangan
    drawingUtils.drawConnectors(
      landmarks,
      HandLandmarker.HAND_CONNECTIONS,
      {
        color:"#00FF00",
        lineWidth:4
      }
    );

    // gambar titik tangan
    drawingUtils.drawLandmarks(
      landmarks,
      {
        color:"#FF0000",
        lineWidth:2
      }
    );

    // gesture
    const gesture =
      detectGesture(
        landmarks
      );

    // jika gesture berubah
    if(
      gesture !== lastGesture
    ){

      lastGesture =
        gesture;

      console.log(
        "Gesture:",
        gesture
      );

      setStatus(
        "Gesture: " + gesture
      );

      // alert
      if(
        gesture !== "HAND"
      ){

        alert(
          "Gesture terdeteksi:\n" +
          gesture
        );

      }
    }

    // ================= GERAK JARI =================
    const tip =
      landmarks[8];

    const x =
      Math.floor(
        tip.x * canvas.width
      );

    const y =
      Math.floor(
        tip.y * canvas.height
      );

    // gambar titik tracking
    ctx.fillStyle =
      "yellow";

    ctx.beginPath();

    ctx.arc(
      x,
      y,
      12,
      0,
      Math.PI * 2
    );

    ctx.fill();

    // gerakan
    if(prevIndex){

      const dx =
        x - prevIndex.x;

      const dy =
        y - prevIndex.y;

      const dist =
        Math.sqrt(
          dx*dx + dy*dy
        );

      if(dist > 30){

        console.log(
          "Jari bergerak"
        );

      }
    }

    prevIndex = {
      x,
      y
    };

  }else{

    setStatus(
      "Tidak ada tangan"
    );

    lastGesture = "";

  }

  requestAnimationFrame(
    predictLoop
  );
}


// ================= INIT =================
async function init(){

  setStatus(
    "Menyalakan kamera..."
  );

  await startCamera();

  setStatus(
    "Loading AI model..."
  );

  await loadModel();

  setStatus(
    "Siap ✨"
  );

  predictLoop();
}

init();

</script>

</body>
</html>
